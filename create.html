<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Custom Link | GyanLoop Redirect</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="container">
    <nav class="header-nav">
      <a href="go.html" class="brand-logo">GyanLoop Redirect</a>
      <a href="go.html" class="btn btn-secondary">← Back to Home</a>
    </nav>
  </header>

  <main class="container">
    <div class="glass-box entry-form">
      <h2 style="margin-bottom: 8px; font-weight: 800;">Create Redirection</h2>
      <p style="color: var(--text-secondary); margin-bottom: 32px; font-size: 0.95rem;">Set custom lookup hash values corresponding directly with explicit links.</p>
      
      <form id="redirect-generation-form">
        <div class="form-group">
          <label for="custom-id">Custom Redirect ID</label>
          <input type="text" id="custom-id" placeholder="e.g. portfolio" required autocomplete="off">
          <span id="id-validation-status" class="feedback-node"></span>
        </div>
        
        <div class="form-group">
          <label for="destination-url">Destination Link Target</label>
          <input type="url" id="destination-url" placeholder="https://example.com/your-deep-link" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; padding: 14px;">Publish Redirect Rule</button>
      </form>

      <div id="success-display-panel"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      &copy; 2026 GyanLoop Redirect Framework.
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/create.js"></script>
</body>
</html>

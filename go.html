<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GyanLoop | Processing Redirect...</title>
  <style>
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .loader-box {
      text-align: center;
      padding: 30px;
      border-radius: 12px;
      background: #1e293b;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: #06b6d4;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="loader-box">
    <div class="spinner"></div>
    <p id="msg">Analyzing routing registry...</p>
  </div>

  <script>
    // Paste your exact deployment URL here
    const API_URL = "https://script.google.com/macros/s/AKfycbykz_WxoKk8rS2TM2VsJGhl8fBq6r4MRKw5WwPIEHgeestUFegNnPfnaLKJbS4ulAO3cg/exec";

    async function executeRedirect() {
      const hash = window.location.hash.trim().toLowerCase();
      const msg = document.getElementById("msg");

      if (!hash) {
        msg.innerText = "No routing key provided. Diverting to home page...";
        setTimeout(() => { window.location.href = "index.html"; }, 2000);
        return;
      }

      try {
        // Pull routing registry from Google Sheets via doGet endpoint
        const response = await fetch(API_URL);
        const data = await response.json();

        if (data.success && data.links) {
          // Find matching link entry
          const match = data.links.find(item => item.id === hash);

          if (match) {
            msg.innerText = "Match found! Redirecting...";
            window.location.href = match.url;
          } else {
            // No matching ID found in sheet rows
            window.location.href = "404.html";
          }
        } else {
          window.location.href = "404.html";
        }
      } catch (error) {
        console.error("Routing error:", error);
        window.location.href = "404.html";
      }
    }

    // Run verification scan immediately on page initialize
    window.addEventListener("DOMContentLoaded", executeRedirect);
  </script>
</body>
</html>
